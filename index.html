<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>On a Whim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #111;
        --muted: #6b6b6b;
        --paper: #f6f2ea;
        --glow: #f9d64a;
        --leaf: #7aa37a;
        --shadow: 0 20px 60px rgba(16, 16, 16, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", Arial, sans-serif;
        color: var(--ink);
        background: radial-gradient(
            circle at 20% 20%,
            rgba(249, 214, 74, 0.4),
            transparent 55%
          ),
          radial-gradient(
            circle at 80% 10%,
            rgba(122, 163, 122, 0.35),
            transparent 50%
          ),
          var(--paper);
        overflow: hidden;
      }

      .app {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      .rail {
        display: flex;
        width: 300vw;
        height: 100vh;
        transform: translateX(0);
        transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
        touch-action: manipulation;
        will-change: transform;
      }

      .panel {
        width: 100vw;
        height: 100vh;
        padding: 24px 18px 120px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
      }

      .header {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .title {
        font-family: "Fraunces", "Times New Roman", serif;
        font-size: 32px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .subtitle {
        font-size: 14px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.2em;
      }

      .trip-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 14px;
      }

      .trip-card {
        border-radius: 18px;
        padding: 18px 16px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        gap: 6px;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .trip-card:active {
        transform: scale(0.98);
      }

      .trip-name {
        font-size: 20px;
        font-weight: 600;
      }

      .trip-route {
        font-size: 14px;
        color: var(--muted);
      }

      .map-frame {
        flex: 1;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: var(--shadow);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .map-frame img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .map-meta {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .map-title {
        font-size: 20px;
        font-weight: 600;
      }

      .map-route {
        color: var(--muted);
        font-size: 14px;
      }

      .gallery-scroll {
        flex: 1;
        overflow-y: auto;
        scroll-snap-type: y mandatory;
        display: grid;
        gap: 16px;
        padding-bottom: 120px;
      }

      .gallery-item {
        scroll-snap-align: start;
        height: 100vh;
        border-radius: 24px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
      }

      .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        flex: 1;
      }

      .gallery-caption {
        padding: 14px 16px 18px;
        font-size: 14px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.9);
      }

      .hint-bar {
        position: fixed;
        left: 50%;
        bottom: 36px;
        transform: translateX(-50%);
        padding: 10px 18px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        border-radius: 999px;
        box-shadow: var(--shadow);
        display: flex;
        gap: 22px;
        z-index: 10;
      }

      .hint-label {
        font-size: 13px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        cursor: pointer;
        user-select: none;
        transition: color 0.3s ease, transform 0.3s ease;
      }

      .hint-label.active {
        color: var(--ink);
        transform: scale(1.06);
      }

      .hint-line {
        position: absolute;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        width: 54px;
        height: 4px;
        border-radius: 999px;
        background: rgba(17, 17, 17, 0.3);
      }

      .empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.7);
        color: var(--muted);
        font-size: 15px;
      }

      @media (min-width: 900px) {
        body {
          overflow: auto;
        }

        .panel {
          padding: 40px 120px 140px;
        }

        .trip-card {
          flex-direction: row;
          justify-content: space-between;
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="rail" id="rail">
        <section class="panel trips" data-panel="trips">
          <div class="header">
            <div class="subtitle">On a Whim</div>
            <div class="title">Na rympal</div>
          </div>
          <ul class="trip-list" id="tripList"></ul>
        </section>
        <section class="panel map" data-panel="map">
          <div class="map-meta">
            <div class="map-title" id="mapTitle">Pick a trip</div>
            <div class="map-route" id="mapRoute">Swipe left when ready</div>
          </div>
          <div class="map-frame" id="mapFrame">
            <div class="empty-state" id="mapEmpty">Select a trip to load a map.</div>
            <img id="mapImage" src="" alt="" hidden />
          </div>
        </section>
        <section class="panel gallery" data-panel="gallery">
          <div class="map-meta">
            <div class="map-title" id="galleryTitle">Text</div>
            <div class="map-route" id="galleryRoute">Swipe right for the map</div>
          </div>
          <div class="gallery-scroll" id="galleryScroll"></div>
        </section>
      </div>
      <div class="hint-line"></div>
      <div class="hint-bar" id="hintBar">
        <div class="hint-label" data-view="trips">All trips</div>
        <div class="hint-label" data-view="map">Map</div>
        <div class="hint-label" data-view="gallery">Text</div>
      </div>
    </div>
    <script src="navigation.js"></script>
  </body>
</html>
